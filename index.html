<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BraFitCoach</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, collection, addDoc, getDocs 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB2nAwk1IlirsX7cpERSCgs-Jj9_Q_2LHM",
  authDomain: "brafitcoach.firebaseapp.com",
  projectId: "brafitcoach",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.db = db;
window.auth = auth;

let userId = null;

// 🔐 ESTADO LOGIN
onAuthStateChanged(auth, async (user) => {
  if (user) {
    userId = user.uid;
    window.userId = userId;

    document.getElementById("authContainer").style.display = "none";
    document.getElementById("appContainer").style.display = "block";

    await loadExercises();
  } else {
    document.getElementById("authContainer").style.display = "block";
    document.getElementById("appContainer").style.display = "none";
  }
});

// 🔥 REGISTRO
window.register = async function () {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  await createUserWithEmailAndPassword(auth, email, pass);
  alert("Usuario creado 🔥");
};

// 🔥 LOGIN
window.login = async function () {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth, email, pass);
  alert("Bienvenida 🔥");
};

// 🔥 LOGOUT
window.logout = async function () {
  await signOut(auth);
};

// 🔥 GUARDAR
window.saveExerciseFirebase = async function (exercise) {
  await addDoc(
    collection(db, "usuarios", userId, "exercises"),
    exercise
  );
};

// 🔥 CARGAR
async function loadExercises() {
  const querySnapshot = await getDocs(
    collection(db, "usuarios", userId, "exercises")
  );

  window.data.exercises = [];

  querySnapshot.forEach(doc => {
    window.data.exercises.push({ id: doc.id, ...doc.data() });
  });

  window.renderExercises();
}

</script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  background: orange;
  color: white;
  cursor: pointer;
}

.card {
  background: #1e293b;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>

</head>

<body>

<!-- 🔐 LOGIN -->
<div id="authContainer">
  <h2>Login / Registro</h2>
  <input type="email" id="email" placeholder="Correo"><br>
  <input type="password" id="password" placeholder="Contraseña"><br>

  <button onclick="register()">Registrarse</button>
  <button onclick="login()">Iniciar sesión</button>
</div>

<!-- 🚀 APP -->
<div id="appContainer" style="display:none;">
  <h1>💪 IronSystem PRO</h1>

  <button onclick="logout()">Cerrar sesión</button>

  <h3>Nuevo ejercicio</h3>
  <input type="text" id="exerciseName" placeholder="Ejercicio">
  
  <select id="muscleGroup">
    <option value="pecho">Pecho</option>
    <option value="espalda">Espalda</option>
    <option value="piernas">Piernas</option>
  </select>

  <button onclick="saveExercise()">Guardar</button>

  <h2>Ejercicios</h2>
  <div id="exercisesList"></div>
</div>

<script>
// 🔥 DATA
window.data = {
  exercises: []
};

// 🔥 GUARDAR
async function saveExercise() {
  const name = document.getElementById("exerciseName").value;
  const muscle = document.getElementById("muscleGroup").value;

  if (!name) {
    alert("Escribe algo");
    return;
  }

  await window.saveExerciseFirebase({ name, muscle });

  alert("Guardado 🔥");

  document.getElementById("exerciseName").value = "";

  renderExercises();
}

    <div class="card">
      ${e.name} - ${e.muscle}
    </div>
  `).join("");
}
</script>

</body>
</html>
