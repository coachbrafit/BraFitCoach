<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BraFit - Coach PRO</title>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { 
  getFirestore, collection, addDoc, getDocs 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB2nAwk1IlirsX7cpERSCgs-Jj9_Q_2LHM",
  authDomain: "brafitcoach.firebaseapp.com",
  projectId: "brafitcoach",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.db = db;
window.auth = auth;

let userId = null;

// 🔐 LOGIN STATE
onAuthStateChanged(auth, async (user) => {
  if (user) {
    userId = user.uid;
    window.userId = userId;

    document.getElementById("authContainer").style.display = "none";
    document.getElementById("appContainer").style.display = "block";

    await initApp();
  } else {
    document.getElementById("authContainer").style.display = "block";
    document.getElementById("appContainer").style.display = "none";
  }
});

// 🔥 REGISTER
window.register = async function () {
  const email = emailInput.value;
  const pass = passwordInput.value;

  if (!email || !pass) return alert("Completa datos");

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    alert("Usuario creado");
  } catch (e) {
    alert(e.message);
  }
};

// 🔥 LOGIN
window.login = async function () {
  const email = emailInput.value;
  const pass = passwordInput.value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    alert(e.message);
  }
};

// 🔥 LOGOUT
window.logout = async () => await signOut(auth);

// 🔥 DATA
window.data = {
  exercises: [],
  routines: [],
  workouts: []
};

// 🔥 LOAD ALL
async function loadAllData() {
  const ex = await getDocs(collection(db, "usuarios", userId, "exercises"));
  data.exercises = ex.docs.map(d => ({ id: d.id, ...d.data() }));
}

// 🔥 INIT
window.initApp = async function () {
  await loadAllData();
  renderExercises();
};
</script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

input, button, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  background: orange;
  color: white;
  cursor: pointer;
}

.card {
  background: #1e293b;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="authContainer">
  <h2>Login / Registro</h2>
  <input id="emailInput" type="email" placeholder="Correo">
  <input id="passwordInput" type="password" placeholder="Contraseña">
  <br>
  <button onclick="register()">Registrarse</button>
  <button onclick="login()">Iniciar sesión</button>
</div>

<!-- 🚀 APP PRO -->
<div id="appContainer" style="display:none;">

  <button onclick="logout()">Cerrar sesión</button>

  <h1>💪 BraFit PRO</h1>

  <!-- 🔥 NAV -->
  <div>
    <button onclick="showTab('exercises')">Ejercicios</button>
  </div>

  <!-- 🔥 EXERCISES -->
  <div id="exercisesTab">

    <h3>Nuevo ejercicio</h3>
    <input id="exerciseName" placeholder="Ejercicio">

    <select id="muscleGroup">
      <option value="pecho">Pecho</option>
      <option value="espalda">Espalda</option>
      <option value="piernas">Piernas</option>
    </select>

    <button onclick="saveExercise()">Guardar</button>

    <h2>Lista</h2>
    <div id="exercisesList"></div>

  </div>

</div>

<script>

// 🔥 SAVE
async function saveExercise() {
  const name = exerciseName.value;
  const muscle = muscleGroup.value;

  if (!name) return alert("Escribe algo");

  const docRef = await addDoc(
    collection(db, "usuarios", userId, "exercises"),
    { name, muscle }
  );

  data.exercises.push({ id: docRef.id, name, muscle });

  renderExercises();
  exerciseName.value = "";
}

// 🔥 RENDER
function renderExercises() {
  exercisesList.innerHTML = data.exercises.map(e => `
    <div class="card">
      ${e.name} - ${e.muscle}
    </div>
  `).join("");
}

// 🔥 NAV
function showTab(tab) {
  document.getElementById("exercisesTab").style.display = "block";
}

</script>

</body>
</html>
