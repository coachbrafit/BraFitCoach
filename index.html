<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronSystem con Firebase</title>
<style>
/* Mantengo tus estilos anteriores */
body { font-family:'Segoe UI', sans-serif; background:#1a1a2e; color:#f5f5f5; margin:0; padding:0; }
header { padding:1rem; background:#16213e; text-align:center; }
.nav-tabs { display:flex; gap:0.5rem; padding:1rem; overflow-x:auto; background: rgba(0,0,0,0.2);}
.nav-tab { padding:0.5rem 1rem; border-radius:20px; cursor:pointer; background:rgba(255,255,255,0.05); color:#aaa;}
.nav-tab.active { background:#ff6b35; color:#fff;}
.section { display:none; padding:1rem;}
.section.active { display:block;}
.card { background: rgba(255,255,255,0.05); padding:1rem; margin-bottom:1rem; border-radius:12px;}
.btn { padding:0.5rem 1rem; border:none; border-radius:10px; cursor:pointer; background:#ff6b35; color:white; margin-top:0.5rem;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="authContainer" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
  <h1>IronSystem</h1>
  <input type="email" id="email" placeholder="Correo" style="margin:0.5rem;">
  <input type="password" id="password" placeholder="Contraseña" style="margin:0.5rem;">
  <button class="btn" onclick="register()">Registrarse</button>
  <button class="btn" onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="appContainer" style="display:none;">
  <header><h1>IronSystem</h1> <button class="btn" onclick="logout()">Salir</button></header>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="showSection('dashboard')">Dashboard</button>
    <button class="nav-tab" onclick="showSection('routines')">Rutinas</button>
    <button class="nav-tab" onclick="showSection('exercises')">Ejercicios</button>
    <button class="nav-tab" onclick="showSection('progress')">Progreso</button>
  </nav>

  <section id="dashboard" class="section active">
    <div class="card"><h2>Bienvenido</h2><p id="welcomeUser"></p></div>
  </section>

  <section id="routines" class="section">
    <div class="card">
      <h2>Mis Rutinas</h2>
      <input type="text" id="routineName" placeholder="Nombre rutina">
      <button class="btn" onclick="addRoutine()">Agregar Rutina</button>
      <ul id="routineList"></ul>
    </div>
  </section>

  <section id="exercises" class="section">
    <div class="card">
      <h2>Mis Ejercicios</h2>
      <input type="text" id="exerciseName" placeholder="Nombre ejercicio">
      <button class="btn" onclick="addExercise()">Agregar Ejercicio</button>
      <ul id="exerciseList"></ul>
    </div>
  </section>

  <section id="progress" class="section">
    <div class="card">
      <h2>Progreso</h2>
      <ul id="progressList"></ul>
    </div>
  </section>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
  getFirestore, collection, addDoc, getDocs, query, where 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyB2nAwk1IlirsX7cpERSCgs-Jj9_Q_2LHM",
  authDomain: "brafitcoach.firebaseapp.com",
  projectId: "brafitcoach",
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = null;

// LOGIN STATE
onAuthStateChanged(auth, async (user) => {
  if(user){
    userId = user.uid;
    document.getElementById('authContainer').style.display='none';
    document.getElementById('appContainer').style.display='block';
    document.getElementById('welcomeUser').innerText = `Usuario: ${user.email}`;
    await loadData();
  } else {
    document.getElementById('authContainer').style.display='flex';
    document.getElementById('appContainer').style.display='none';
  }
});

// REGISTER
window.register = async () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  if(!email || !pass){ alert("Completa correo y contraseña"); return; }
  try{
    await createUserWithEmailAndPassword(auth,email,pass);
    alert("Usuario creado ✅");
  }catch(e){ alert("Error: "+e.message); }
}

// LOGIN
window.login = async () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  if(!email || !pass){ alert("Completa correo y contraseña"); return; }
  try{
    await signInWithEmailAndPassword(auth,email,pass);
    alert("Bienvenida ✅");
  }catch(e){ alert("Error: "+e.message); }
}

// LOGOUT
window.logout = async () => { await signOut(auth); }

// NAVIGATION
window.showSection = (id) => {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.nav-tab[onclick="showSection('${id}')"]`).classList.add('active');
}

// 🔥 FIRESTORE CRUD
async function loadData(){
  await loadRoutines();
  await loadExercises();
  await loadProgress();
}

// Rutinas
async function addRoutine(){
  const name = document.getElementById('routineName').value;
  if(!name) return;
  await addDoc(collection(db,'routines'), { userId, name, created:new Date() });
  document.getElementById('routineName').value='';
  await loadRoutines();
}
async function loadRoutines(){
  const q = query(collection(db,'routines'), where('userId','==',userId));
  const snapshot = await getDocs(q);
  const list = document.getElementById('routineList');
  list.innerHTML='';
  snapshot.forEach(doc=>{
    const li = document.createElement('li'); li.innerText = doc.data().name; list.appendChild(li);
  });
}

// Ejercicios
async function addExercise(){
  const name = document.getElementById('exerciseName').value;
  if(!name) return;
  await addDoc(collection(db,'exercises'), { userId, name, created:new Date() });
  document.getElementById('exerciseName').value='';
  await loadExercises();
}
async function loadExercises(){
  const q = query(collection(db,'exercises'), where('userId','==',userId));
  const snapshot = await getDocs(q);
  const list = document.getElementById('exerciseList');
  list.innerHTML='';
  snapshot.forEach(doc=>{
    const li = document.createElement('li'); li.innerText = doc.data().name; list.appendChild(li);
  });
}

// Progreso demo
async function loadProgress(){
  const q = query(collection(db,'progress'), where('userId','==',userId));
  const snapshot = await getDocs(q);
  const list = document.getElementById('progressList');
  list.innerHTML='';
  snapshot.forEach(doc=>{
    const li = document.createElement('li'); li.innerText = `${doc.data().type || 'Ejercicio'} - ${doc.data().value || 0}`; list.appendChild(li);
  });
}
</script>
</body>
</html>
