<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronSystem</title>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2nAwk1IlirsX7cpERSCgs-Jj9_Q_2LHM",
  authDomain: "brafitcoach.firebaseapp.com",
  projectId: "brafitcoach",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.db = db;

let userId = null;

// 🔐 Login automático
signInAnonymously(auth);

onAuthStateChanged(auth, async (user) => {
  if (user) {
    userId = user.uid;
    window.userId = userId;
    console.log("Usuario conectado:", userId);

    await loadExercisesFromFirebase();
  }
});

// 🔥 Cargar ejercicios
async function loadExercisesFromFirebase() {
  const querySnapshot = await getDocs(
    collection(window.db, "usuarios", window.userId, "exercises")
  );

  window.data.exercises = [];

  querySnapshot.forEach((doc) => {
    window.data.exercises.push({ id: doc.id, ...doc.data() });
  });

  if (window.renderExercises) {
    window.renderExercises();
  }
}

// 🔥 Guardado base (para que no rompa)
window.saveDataFirestore = async function () {
  console.log("Guardado en Firebase (pendiente ampliar)");
};

// 🔥 Guardar ejercicio
window.saveExerciseFirebase = async function (exercise) {
  await addDoc(
    collection(window.db, "usuarios", window.userId, "exercises"),
    exercise
  );
};

</script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 20px;
}
input, button {
  margin: 5px;
  padding: 10px;
}
.card {
  background: #222;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>

</head>

<body>

<h1>💪 IronSystem</h1>

<!-- 🔥 FORM -->
<input type="text" id="exerciseName" placeholder="Ejercicio">
<select id="muscleGroup">
  <option value="pecho">Pecho</option>
  <option value="espalda">Espalda</option>
</select>

<button onclick="saveExercise()">Guardar ejercicio</button>

<h2>Ejercicios</h2>
<div id="exercisesList"></div>

<script>
let data = {
  exercises: []
};

// 🔥 GUARDAR EJERCICIO
async function saveExercise() {
  const name = document.getElementById("exerciseName").value;
  const muscle = document.getElementById("muscleGroup").value;

  if (!name) {
    alert("Escribe un nombre");
    return;
  }

  const newExercise = { name, muscle };

  await window.saveExerciseFirebase(newExercise);

  alert("Guardado en Firebase 🔥");

  document.getElementById("exerciseName").value = "";

  renderExercises();
}

// 🔥 RENDER
function renderExercises() {
  const container = document.getElementById("exercisesList");

  container.innerHTML = data.exercises.map(e => `
    <div class="card">
      ${e.name} - ${e.muscle}
    </div>
  `).join("");
}

// 🔥 LOGIN SIMULADO (para que no falle)
function login(){
  alert("Login aún no activo");
}

function register(){
  alert("Registro aún no activo");
}

</script>

</body>
</html>
